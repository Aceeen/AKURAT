services:
  # 1. Laravel App
  app:
    build: .
    container_name: akurat_app
    restart: always
    volumes:
      - .:/var/www
    networks:
      - akurat_net

  # 2. Database PostgreSQL
  db:
    image: postgres:15
    container_name: akurat_db
    restart: always
    environment:
      POSTGRES_DB: db_akurat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_rahasia # Ganti dengan password kuat
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - akurat_net

  # 3. Nginx (Web Server)
  nginx:
    image: nginx:alpine
    container_name: akurat_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker-conf/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - akurat_net

  # 4. Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: akurat_tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=MASUKKAN_TOKEN_DARI_CLOUDFLARE_DI_SINI
    command: tunnel run
    networks:
      - akurat_net

networks:
  akurat_net:
    driver: bridge

volumes:
  pgdata: